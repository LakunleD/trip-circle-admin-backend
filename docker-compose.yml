services:
  tc-admin-backend:
    build: .
    container_name: tc-admin-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    networks:
      - selfhosted_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  selfhosted_internal:
    external: true
